<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>智能助手</title>
    <style>
      :root {
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --blue-light: #eff6ff;
        --blue-ring: #93c5fd;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --radius: 16px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
          "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        height: 100dvh;
        overflow: hidden;
      }

      /* ---- Sidebar ---- */
      .sidebar {
        width: 268px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: transform 0.25s ease;
      }
      .sidebar__head {
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }
      .logo {
        width: 34px; height: 34px; border-radius: 10px;
        background: linear-gradient(135deg, var(--blue), #3b82f6);
        display: grid; place-items: center; color: #fff;
        font-weight: 700; font-size: 17px;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }
      .sidebar__head h1 { font-size: 15px; font-weight: 600; }
      .sidebar__head p { font-size: 11px; color: var(--text-muted); }

      .new-btn {
        margin: 14px;
        padding: 11px;
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        display: flex; align-items: center; justify-content: center; gap: 6px;
      }
      .new-btn:hover { background: var(--blue-dark); }

      .session-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .session {
        padding: 11px 12px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--text);
        transition: background 0.12s;
        position: relative;
      }
      .session:hover { background: var(--bg); }
      .session.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
      .session__title {
        flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .session__del {
        opacity: 0; border: none; background: transparent; cursor: pointer;
        color: var(--text-muted); font-size: 15px; padding: 2px 4px; border-radius: 6px;
        transition: opacity 0.12s, color 0.12s, background 0.12s;
        flex-shrink: 0;
      }
      .session:hover .session__del { opacity: 1; }
      .session__del:hover { color: #dc2626; background: #fee2e2; }
      .session-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 30px 10px; }

      /* ---- Main ---- */
      .panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .topbar {
        display: none;
        padding: 12px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        align-items: center;
        gap: 12px;
      }
      .menu-btn {
        border: 1px solid var(--border); background: var(--surface);
        border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 16px;
      }
      .topbar h2 { font-size: 15px; font-weight: 600; }

      main { flex: 1; overflow-y: auto; padding: 50px 16px; background: #ffffff; }
      .chat { width: 100%; max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

      .welcome { text-align: center; color: var(--text-muted); margin: 56px 0; }
      .welcome .big { font-size: 22px; color: var(--text); font-weight: 600; margin-bottom: 8px; }
      .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 22px; }
      .chip {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 999px; padding: 9px 16px; font-size: 13px; cursor: pointer;
        transition: all 0.15s; color: var(--text);
      }
      .chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

      .msg { display: flex; gap: 10px; align-items: flex-start; width: 100%; }
      .msg.user { flex-direction: row-reverse; }
      .avatar {
        width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
        display: grid; place-items: center; font-size: 14px; font-weight: 600;
      }
      .msg.user .avatar { background: var(--blue); color: #fff; }
      .msg.bot .avatar { background: var(--blue-light); color: var(--blue); }
      .msg__content {
        display: flex; flex-direction: column; min-width: 0;
        max-width: min(78%, 620px); align-items: flex-start;
      }
      .msg.user .msg__content { align-items: flex-end; }
      /* 回复消息：占满整列宽度，右边界与提问消息列对齐（图表等满宽）*/
      .msg.bot .msg__content { max-width: 100%; flex: 1 1 auto; width: 100%; }
      .msg.bot .bubble { width: 100%; max-width: 100%; box-sizing: border-box; }
      .bubble {
        width: fit-content; max-width: 100%;
        padding: 12px 16px; border-radius: var(--radius);
        font-size: 15px; line-height: 1.7;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: normal;
      }
      .msg.user .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
      .msg.bot .bubble { background: var(--surface); border: none; border-bottom-left-radius: 4px; }
      .bubble.md { white-space: normal; }
      .bubble.md > *:first-child { margin-top: 0; }
      .bubble.md > *:last-child { margin-bottom: 0; }
      .bubble.md p { margin: 8px 0; }
      .bubble.md h1, .bubble.md h2, .bubble.md h3 { margin: 14px 0 8px; line-height: 1.35; }
      .bubble.md h1 { font-size: 1.3em; }
      .bubble.md h2 { font-size: 1.18em; }
      .bubble.md h3 { font-size: 1.06em; }
      .bubble.md ul, .bubble.md ol { margin: 8px 0; padding-left: 22px; }
      .bubble.md li { margin: 3px 0; }
      .bubble.md code {
        background: #eef2f7; padding: 2px 6px;
        border-radius: 5px; font-size: 0.88em;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      .bubble.md pre {
        background: var(--bg); color: var(--text); padding: 12px 14px;
        border: 1px solid var(--border); border-radius: 10px;
        overflow-x: auto; margin: 10px 0;
      }
      .chart-box {
        margin: 12px 0; padding: 10px; border: 1px solid var(--border);
        border-radius: 12px; background: #fff;
        width: 100%; box-sizing: border-box; cursor: zoom-in;
        transition: box-shadow 0.15s;
      }
      .chart-box:hover { box-shadow: 0 2px 12px rgba(37,99,235,0.18); }
      .chart-box svg.cw-chart { width: 100%; height: auto; display: block; }
      .chart-modal {
        position: fixed; inset: 0; z-index: 40;
        background: rgba(15,23,42,0.55);
        display: flex; align-items: center; justify-content: center;
        padding: 28px;
      }
      .chart-modal__inner {
        background: #fff; border-radius: 16px; padding: 20px;
        width: min(960px, 94vw); max-height: 90vh; overflow: auto;
        box-shadow: 0 24px 70px rgba(15,23,42,0.35); cursor: default;
      }
      .chart-modal__inner svg.cw-chart { width: 100%; height: auto; display: block; }
      .bubble.md pre code { background: transparent; color: inherit; padding: 0; font-size: 0.86em; }
      .bubble.md a { color: var(--blue); text-decoration: underline; }
      .bubble.md blockquote {
        margin: 10px 0; padding: 4px 14px; border-left: 3px solid var(--blue-ring);
        color: var(--text-muted);
      }
      .bubble.md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
      .bubble.md table { border-collapse: collapse; margin: 10px 0; font-size: 0.92em; }
      .bubble.md th, .bubble.md td { border: 1px solid var(--border); padding: 6px 10px; }
      .bubble.md th { background: var(--blue-light); }
      .bubble.md strong { font-weight: 600; }
      .msg.bot .avatar { display: none; }
      /* 一问一答为一轮，新一轮提问前留更大间距 */
      .msg.bot + .msg.user { margin-top: 26px; }

      .trace { margin: 0 0 10px; font-size: 12px; color: var(--text-muted); }
      .trace details { background: var(--blue-light); border-radius: 10px; padding: 8px 14px; }
      .trace summary { cursor: pointer; color: var(--blue); user-select: none; font-weight: 500; }
      .trace .steps { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
      .trace .step { padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,0.6);
        white-space: pre-wrap; word-break: break-word; line-height: 1.55; }
      .trace .step.think { color: var(--text); }
      .trace .step.think::before { content: "💭 思考  "; color: var(--blue); font-weight: 600; }
      .trace .step.call { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .trace .step.call::before { content: "→ 调用  "; font-family: inherit; color: var(--blue); font-weight: 600; }
      .trace .step.result { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--text-secondary, #475569); }
      .trace .step.result::before { content: "✓ 结果  "; font-family: inherit; color: #16a34a; font-weight: 600; }

      .typing { display: flex; gap: 4px; padding: 4px 0; }
      .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--blue-ring);
        animation: bounce 1.2s infinite ease-in-out; }
      .typing span:nth-child(2) { animation-delay: 0.15s; }
      .typing span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

      /* 正在执行：极简蓝色环 + 已用时长 */
      .run-pill {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 4px 0; color: var(--blue); font-size: 13px;
      }
      .run-pill .spark {
        width: 14px; height: 14px; color: var(--blue);
        animation: spin 0.9s linear infinite;
        transform-origin: center;
      }
      .run-pill .run-time { font-variant-numeric: tabular-nums; color: var(--blue); }
      @keyframes spin { to { transform: rotate(360deg); } }

      footer {
        flex-shrink: 0; padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
        background: var(--surface); border-top: 1px solid var(--border);
        display: flex; justify-content: center;
      }
      .composer {
        width: 100%; max-width: 760px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .composer-row { display: flex; gap: 10px; align-items: flex-end; }
      textarea {
        flex: 1; resize: none; border: 1px solid var(--border); border-radius: 14px;
        padding: 13px 16px; font-size: 15px; font-family: inherit; line-height: 1.5;
        max-height: 140px; outline: none; background: var(--bg);
        transition: border-color 0.15s, box-shadow 0.15s;
        scrollbar-width: none; -ms-overflow-style: none;
      }
      textarea::-webkit-scrollbar { width: 0; height: 0; display: none; }
      textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); background: #fff; }
      button.send {
        background: var(--blue); color: #fff; border: none; border-radius: 14px;
        padding: 0 22px; height: 48px; min-width: 78px; font-size: 15px; font-weight: 600;
        cursor: pointer; transition: background 0.15s; flex-shrink: 0;
        display: inline-flex; align-items: center; justify-content: center;
      }
      button.send:hover { background: var(--blue-dark); }
      button.send:disabled { opacity: 0.5; cursor: not-allowed; }

      /* 附件：回形针按钮 + 输入框上方芯片列 + 拖拽蒙层 */
      .composer-row > textarea { flex: 1 1 auto; min-width: 0; }
      .attach-btn {
        width: 48px; height: 48px; flex-shrink: 0; border: 1px solid var(--border);
        background: var(--bg); border-radius: 14px; color: var(--text-muted);
        cursor: pointer; display: grid; place-items: center; transition: all 0.15s;
      }
      .attach-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
      .attach-btn .ic { width: 20px; height: 20px; }
      .attach-chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .attach-chips:empty { display: none; }
      .att-chip {
        display: flex; align-items: center; gap: 6px; max-width: 240px;
        padding: 6px 10px; background: var(--blue-light); color: var(--blue);
        border: 1px solid var(--blue-ring); border-radius: 10px; font-size: 12.5px;
      }
      .att-chip .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .att-chip .sz { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
      .att-chip .rm {
        cursor: pointer; border: none; background: none; color: var(--blue);
        font-size: 15px; line-height: 1; padding: 0 0 0 2px; flex-shrink: 0;
      }
      .att-chip.uploading { opacity: 0.55; }
      .msg.user .att-line {
        font-size: 12px; opacity: 0.9; margin-top: 4px;
        display: inline-flex; align-items: center; gap: 5px;
      }
      .att-line .ic-att { width: 13px; height: 13px; flex-shrink: 0; }
      .drop-overlay {
        display: none; position: fixed; inset: 0; z-index: 30;
        background: rgba(37,99,235,0.08); align-items: center; justify-content: center;
        pointer-events: none;
      }
      .drop-overlay.show { display: flex; }
      .drop-overlay__box {
        padding: 28px 44px; background: var(--surface); border: 2px dashed var(--blue);
        border-radius: 16px; color: var(--blue); font-size: 16px; font-weight: 600;
        box-shadow: 0 12px 40px rgba(15,23,42,0.18);
        display: flex; flex-direction: column; align-items: center; gap: 10px;
      }
      .drop-overlay__box .ic-up { width: 36px; height: 36px; }

      /* 生成中：发送按钮切换成扁平浅灰"禁止"按钮 */
      button.send.stop { background: #e2e8f0; padding: 0; }
      button.send.stop:hover { background: #cbd5e1; }
      button.send.stop .ic { width: 18px; height: 18px; color: #475569; }
      textarea:disabled { background: var(--bg); color: var(--text-muted); cursor: not-allowed; }

      .settings-btn {
        margin: 0 14px 14px; padding: 11px; background: var(--bg);
        border: 1px solid var(--border); border-radius: 12px;
        font-size: 14px; color: var(--text); cursor: pointer; transition: all 0.15s;
      }
      .settings-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

      .ic { width: 16px; height: 16px; flex-shrink: 0; vertical-align: -3px; }
      .ic-btn {
        display: inline-flex; align-items: center; gap: 7px; justify-content: center;
      }
      .modal__close { display: grid; place-items: center; }
      .modal__close .ic { width: 20px; height: 20px; }
      .menu-btn { display: grid; place-items: center; }
      .menu-btn .ic { width: 18px; height: 18px; }
      .session__del { display: grid; place-items: center; }
      .session__del .ic { width: 15px; height: 15px; }
      #keyToggle { display: grid; place-items: center; }

      .limit-banner {
        display: none; padding: 11px 18px; font-size: 13.5px; line-height: 1.5;
        border-bottom: 1px solid transparent; cursor: default;
      }
      .limit-banner.show { display: flex; align-items: center; gap: 10px; }
      .limit-banner.blocked {
        background: #fef2f2; color: #991b1b; border-bottom-color: #fecaca; cursor: pointer;
      }
      .limit-banner.overridden {
        background: #fffbeb; color: #92400e; border-bottom-color: #fde68a;
      }
      .limit-banner .lb-ic { width: 16px; height: 16px; flex-shrink: 0; }
      .limit-banner .lb-act {
        margin-left: auto; font-weight: 600; text-decoration: underline; white-space: nowrap;
      }
      .composer.disabled { opacity: 0.55; pointer-events: none; }

      .scrim {
        display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 5;
      }

      /* ---- Settings modal ---- */
      .modal-mask {
        display: none; position: fixed; inset: 0; z-index: 20;
        background: rgba(15,23,42,0.45); align-items: center; justify-content: center;
        padding: 20px;
      }
      .modal-mask.open { display: flex; }
      .modal {
        background: var(--surface); border-radius: 18px; width: 100%; max-width: 880px;
        height: min(680px, 90vh); display: flex; overflow: hidden;
        box-shadow: 0 20px 60px rgba(15,23,42,0.3);
      }
      .modal__nav {
        width: 184px; background: var(--bg); border-right: 1px solid var(--border);
        padding: 18px 10px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
      }
      .modal__nav h3 { font-size: 13px; color: var(--text-muted); padding: 6px 12px 10px; }
      .tab-btn {
        text-align: left; border: none; background: transparent; padding: 10px 12px;
        border-radius: 9px; font-size: 14px; color: var(--text); cursor: pointer; transition: all 0.12s;
      }
      .tab-btn:hover { background: var(--surface); }
      .tab-btn.active { background: var(--blue); color: #fff; font-weight: 600; }
      .modal__body { flex: 1; padding: 26px 30px; overflow-y: auto; }
      .modal__body h2 { font-size: 18px; margin-bottom: 4px; }
      .modal__body .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
      .modal__close {
        position: absolute; top: 22px; right: 26px; border: none; background: transparent;
        font-size: 22px; color: var(--text-muted); cursor: pointer; line-height: 1;
      }
      .field { margin-bottom: 16px; }
      .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
      .field input, .field select, .field textarea {
        width: 100%; padding: 10px 12px; border: 1px solid var(--border);
        border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; background: var(--bg);
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); background:#fff;
      }
      .field textarea { resize: vertical; min-height: 90px; }
      .btn-primary {
        background: var(--blue); color: #fff; border: none; border-radius: 10px;
        padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .btn-primary:hover { background: var(--blue-dark); }
      .btn-ghost {
        background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
        padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text);
      }
      .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
      .btn-danger { color: #dc2626; border-color: #fecaca; }
      .btn-danger:hover { background: #fee2e2; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 22px; }
      .stat {
        background: var(--blue-light); border-radius: 12px; padding: 16px;
      }
      .stat .num { font-size: 24px; font-weight: 700; color: var(--blue); }
      .stat .lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
      .bars { display: flex; align-items: flex-end; gap: 6px; height: 170px; margin: 14px 0 8px; }
      .bar-wrap { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; }
      .bar-col { flex: 1; width: 100%; display: flex; align-items: flex-end; justify-content: center; }
      .bar {
        width: 64%; max-width: 30px; background: var(--blue);
        border-radius: 4px 4px 0 0; min-height: 2px;
        transition: height 0.3s, background 0.15s; cursor: pointer;
      }
      .bar:hover { background: var(--blue-dark); }
      .bar-lbl { font-size: 9px; color: var(--text-muted); margin-top: 7px; transform: rotate(-42deg); white-space: nowrap; height: 14px; }
      .list-item {
        display: flex; align-items: center; gap: 10px; padding: 12px;
        border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
        transition: border-color 0.15s, background 0.15s;
      }
      .list-item.fhe-drop.dragover {
        border-color: var(--blue); border-style: dashed;
        background: var(--blue-light);
      }
      .sk-drop {
        border: 2px dashed var(--border); border-radius: 14px;
        padding: 30px 20px; text-align: center; color: var(--text-muted);
        transition: border-color 0.15s, background 0.15s;
      }
      .sk-drop.dragover { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
      .sk-drop__ic { color: var(--blue); opacity: 0.8; margin-bottom: 8px; }
      .sk-drop__t { font-size: 15px; color: var(--text); }
      .sk-drop__s { font-size: 13px; margin-top: 6px; }
      .sk-pick { color: var(--blue); cursor: pointer; text-decoration: underline; }
      .list-item .grow { flex: 1; min-width: 0; }
      .list-item .grow .t { font-weight: 600; font-size: 14px; }
      .list-item .grow .d { font-size: 12px; color: var(--text-muted); margin-top: 2px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .badge { font-size: 12px; padding: 3px 9px; border-radius: 999px; font-weight: 500; }
      .badge.ok { background: #dcfce7; color: #166534; }
      .badge.no { background: #fee2e2; color: #991b1b; }
      .badge.warn { background: #fef3c7; color: #92400e; }
      .alert-box {
        background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
        padding: 12px 16px; border-radius: 10px; margin-bottom: 18px; font-size: 14px;
      }

    </style>
  </head>
