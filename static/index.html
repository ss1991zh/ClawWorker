    <script src="/static/marked.min.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      // Markdown → HTML（轻量消毒：去掉 script/事件属性）
      if (window.marked) marked.setOptions({ breaks: true, gfm: true });
      function renderMd(text) {
        let html;
        try {
          html = window.marked ? marked.parse(String(text || "")) : null;
        } catch {
          html = null;
        }
        if (html == null) {
          const d = document.createElement("div");
          d.textContent = String(text || "");
          return d.innerHTML;
        }
        return html
          .replace(/<script[\s\S]*?<\/script>/gi, "")
          .replace(/ on\w+="[^"]*"/gi, "")
          .replace(/ on\w+='[^']*'/gi, "")
          .replace(/javascript:/gi, "");
      }
      // 打字阶段隐藏 ```chart 原文，替换为占位提示；完成后再渲染真图表
      function stripChartForTyping(text) {
        return String(text || "").replace(
          /```chart[\s\S]*?```/gi,
          "\n📊 图表生成中…\n"
        );
      }

      // ===== 图表渲染：```chart {json} ``` → 内联 SVG（柱状/折线）=====
      const CHART_COLORS = ["#2563eb", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#06b6d4"];
      function chartSVG(spec) {
        const type = (spec.type || "bar").toLowerCase();
        const labels = Array.isArray(spec.labels) && spec.labels.length
          ? spec.labels.map(String)
          : (spec.data || (spec.series && spec.series[0] && spec.series[0].data) || [])
              .map((_, i) => String(i + 1));
        let series = spec.series;
        if (!Array.isArray(series) || !series.length) {
          series = [{ name: spec.name || "数值", data: spec.data || [] }];
        }
        series = series.map((s) => ({ name: s.name || "", data: (s.data || []).map(Number) }));
        const W = 640, H = 340, L = 52, R = 18, T = spec.title ? 42 : 22, B = 54;
        const iw = W - L - R, ih = H - T - B;
        const allv = series.flatMap((s) => s.data);
        let yMax = Math.max(1, ...allv), yMin = Math.min(0, ...allv);
        const span = yMax - yMin || 1;
        const x = (i) => L + (labels.length <= 1 ? iw / 2 : (i * iw) / (labels.length - 1));
        const xb = (i) => L + (i + 0.5) * (iw / labels.length);
        const y = (v) => T + ih - ((v - yMin) / span) * ih;
        let el = `<svg viewBox="0 0 ${W} ${H}" class="cw-chart" xmlns="http://www.w3.org/2000/svg">`;
        if (spec.title)
          el += `<text x="${W / 2}" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">${esc(spec.title)}</text>`;
        // y 轴网格 + 刻度
        for (let g = 0; g <= 4; g++) {
          const val = yMin + (span * g) / 4, yy = y(val);
          el += `<line x1="${L}" y1="${yy}" x2="${W - R}" y2="${yy}" stroke="#e2e8f0" stroke-width="1"/>`;
          el += `<text x="${L - 8}" y="${yy + 4}" text-anchor="end" font-size="10" fill="#94a3b8">${(Math.round(val * 100) / 100)}</text>`;
        }
        // x 轴标签
        labels.forEach((lb, i) => {
          const xx = type === "bar" ? xb(i) : x(i);
          el += `<text x="${xx}" y="${H - B + 18}" text-anchor="middle" font-size="10" fill="#64748b">${esc(lb)}</text>`;
        });
        if (type === "line") {
          series.forEach((s, si) => {
            const c = CHART_COLORS[si % CHART_COLORS.length];
            const pts = s.data.map((v, i) => `${x(i)},${y(v)}`).join(" ");
            el += `<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
            s.data.forEach((v, i) => {
              el += `<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="#fff" stroke="${c}" stroke-width="2"/>`;
              el += `<text x="${x(i)}" y="${y(v) - 9}" text-anchor="middle" font-size="10" fill="${c}" font-weight="600">${v}</text>`;
            });
          });
        } else {
          const gw = iw / labels.length, ns = series.length;
          const bw = Math.min(46, (gw * 0.7) / ns);
          series.forEach((s, si) => {
            const c = CHART_COLORS[si % CHART_COLORS.length];
            s.data.forEach((v, i) => {
              const cx = L + i * gw + gw / 2 + (si - (ns - 1) / 2) * (bw + 3);
              const yy = y(v), y0 = y(0);
              const top = Math.min(yy, y0), hgt = Math.max(2, Math.abs(y0 - yy));
              el += `<rect x="${cx - bw / 2}" y="${top}" width="${bw}" height="${hgt}" rx="3" fill="${c}"><title>${esc(s.name)} ${esc(labels[i])}: ${v}</title></rect>`;
              el += `<text x="${cx}" y="${top - 5}" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">${v}</text>`;
            });
          });
        }
        // 图例（多系列）
        if (series.length > 1 && series.some((s) => s.name)) {
          let lx = L;
          el += `<g font-size="11" fill="#475569">`;
          series.forEach((s, si) => {
            const c = CHART_COLORS[si % CHART_COLORS.length];
            el += `<rect x="${lx}" y="${H - 14}" width="11" height="11" rx="2" fill="${c}"/>`;
            el += `<text x="${lx + 16}" y="${H - 5}">${esc(s.name || "系列" + (si + 1))}</text>`;
            lx += 16 + (s.name || "系列1").length * 9 + 22;
          });
          el += `</g>`;
        }
        return el + "</svg>";
      }
      function enhanceCharts(rootEl) {
        if (!rootEl) return;
        rootEl.querySelectorAll("pre > code.language-chart, pre > code.lang-chart").forEach((code) => {
          let spec;
          try { spec = JSON.parse(code.textContent.trim()); } catch { return; }
          const box = document.createElement("div");
          box.className = "chart-box";
          try { box.innerHTML = chartSVG(spec); } catch { return; }
          const pre = code.closest("pre");
          if (pre && pre.parentNode) pre.parentNode.replaceChild(box, pre);
        });
      }

      // Flat stroke icons (Feather/Lucide style)
      const svg = (p) =>
        `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
      const IC = {
        x: svg('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'),
        trash: svg('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>'),
        search: svg('<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>'),
        eye: svg('<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>'),
        eyeOff: svg('<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'),
      };
      const chat = $("chat"), welcome = $("welcome"), input = $("input"),
            sendBtn = $("send"), main = $("main"), sessionList = $("sessionList"),
            sidebar = $("sidebar"), scrim = $("scrim"), topTitle = $("topTitle"),
            attachBtn = $("attachBtn"), fileInput = $("fileInput"),
            attachChips = $("attachChips"), dropOverlay = $("dropOverlay");
      let currentSession = null;
      let sessions = [];
      let pendingAttachments = [];   // [{name, path, size}] 已上传待发送的附件

      // ===== 追踪最新内容（follow tail）=====
      // 用户滚到底部时自动追踪新内容；用户滚轮上翻时取消追踪、保留滚动位置；
      // 用户再滚回底部时恢复追踪。
      let followTail = true;
      const NEAR_BOTTOM = 48;
      const isNearBottom = () =>
        main.scrollHeight - main.scrollTop - main.clientHeight <= NEAR_BOTTOM;
      main.addEventListener("scroll", () => { followTail = isNearBottom(); }, { passive: true });
      // 滚轮/触屏向上的瞬间立刻取消追踪（无需等到 scroll 事件）
      main.addEventListener("wheel", (e) => { if (e.deltaY < 0) followTail = false; }, { passive: true });
      main.addEventListener("touchmove", () => { if (!isNearBottom()) followTail = false; }, { passive: true });
      // 只有在追踪状态下才把视图拉到底
      const scrollDown = () =>
        requestAnimationFrame(() => { if (followTail) main.scrollTop = main.scrollHeight; });
      // 用户主动发送 / 新建会话时强制重新追踪（用户意图就是看最新）
      const resumeFollow = () => {
        followTail = true;
        requestAnimationFrame(() => (main.scrollTop = main.scrollHeight));
      };

      function clearChat(showWelcome) {
        chat.innerHTML = "";
        if (showWelcome) chat.appendChild(welcome), (welcome.style.display = "");
      }

      function addMsg(role, text) {
        welcome.style.display = "none";
        const msg = document.createElement("div");
        msg.className = "msg " + role;
        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = role === "user" ? "我" : "助";
        const wrap = document.createElement("div");
        wrap.className = "msg__content";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (role === "bot") {
          bubble.classList.add("md");
          bubble.innerHTML = renderMd(text);
          enhanceCharts(bubble);
        } else {
          bubble.textContent = text;
        }
        wrap.appendChild(bubble);
        msg.append(av, wrap);
        chat.appendChild(msg);
        scrollDown();
        return wrap;
      }
      // 打字机效果：返回 { wrap, done(Promise) }
      function typeBotMessage(text) {
        welcome.style.display = "none";
        const msg = document.createElement("div");
        msg.className = "msg bot";
        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = "助";
        const wrap = document.createElement("div");
        wrap.className = "msg__content";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        wrap.appendChild(bubble);
        msg.append(av, wrap);
        chat.appendChild(msg);
        scrollDown();

        const full = String(text || "");
        const disp = stripChartForTyping(full);  // 打字阶段不显示 chart 原文
        // 快速打字：按长度自适应步长，长文本总时长封顶 ~2.5s
        const step = Math.max(2, Math.ceil(disp.length / 220));
        let i = 0;
        const atBottom = () =>
          main.scrollHeight - main.scrollTop - main.clientHeight < 80;
        const done = new Promise((resolve) => {
          const timer = setInterval(() => {
            i += step;
            bubble.textContent = disp.slice(0, i);
            if (followTail) main.scrollTop = main.scrollHeight;
            if (i >= disp.length) {
              clearInterval(timer);
              bubble.classList.add("md");
              bubble.innerHTML = renderMd(full);
              enhanceCharts(bubble);
              if (followTail) main.scrollTop = main.scrollHeight;
              resolve();
            }
          }, 14);
        });
        return { wrap, done };
      }

      // 流式：先建空 bot 消息（trace 实时追加），最后把回答打字进同一消息
      function startBotMessage() {
        welcome.style.display = "none";
        // 复用 addTyping 创建的占位 bot 消息，保留底部的 .run-pill（执行动效 + 已用时长）
        const ex = $("typing");
        if (ex) {
          ex.removeAttribute("id");
          return ex.querySelector(".msg__content");
        }
        const msg = document.createElement("div");
        msg.className = "msg bot";
        const av = document.createElement("div");
        av.className = "avatar"; av.textContent = "助";
        const wrap = document.createElement("div");
        wrap.className = "msg__content";
        msg.append(av, wrap);
        chat.appendChild(msg);
        scrollDown();
        return wrap;
      }

      // 可增量追加步骤的折叠 trace 块：每步打字机显示，全部完成后自动折叠
      function makeLiveTrace(wrap) {
        const box = document.createElement("div");
        box.className = "trace";
        const det = document.createElement("details");
        det.open = true;
        const sum = document.createElement("summary");
        const list = document.createElement("div");
        list.className = "steps";
        det.append(sum, list);
        box.appendChild(det);
        // 把 trace 块放在 .run-pill（执行动效）之前，pill 始终留在最下方
        const pill = wrap.querySelector(".run-pill");
        if (pill) wrap.insertBefore(box, pill); else wrap.appendChild(box);
        const counts = { thinking: 0, "tool-call": 0, "tool-result": 0, n: 0 };
        const refresh = () => {
          sum.textContent =
            `思考与工具调用记录（${counts.n} 步` +
            (counts.thinking ? ` · ${counts.thinking} 思考` : "") +
            (counts["tool-call"] ? ` · ${counts["tool-call"]} 调用` : "") + "）";
        };
        refresh();

        const queue = [];
        let busy = false;
        let drainResolve = null;
        const atBottom = () =>
          main.scrollHeight - main.scrollTop - main.clientHeight < 140;

        function typeStep(s) {
          counts.n++; if (counts[s.kind] != null) counts[s.kind]++;
          refresh();
          const d = document.createElement("div");
          d.className = "step " + (s.kind === "tool-call" ? "call"
            : s.kind === "tool-result" ? "result" : "think");
          list.appendChild(d);
          const full = String(s.text || "");
          const per = Math.max(1, Math.ceil(full.length / 43)); // 每步 ~0.6s
          let i = 0;
          return new Promise((resolve) => {
            const t = setInterval(() => {
              i += per;
              d.textContent = full.slice(0, i);
              if (followTail) main.scrollTop = main.scrollHeight;
              if (i >= full.length) {
                clearInterval(t);
                d.textContent = full;
                if (followTail) main.scrollTop = main.scrollHeight;
                resolve();
              }
            }, 14);
          });
        }
        async function pump() {
          if (busy) return;
          busy = true;
          while (queue.length) await typeStep(queue.shift());
          busy = false;
          if (drainResolve) { drainResolve(); drainResolve = null; }
        }
        return {
          add(s) { queue.push(s); pump(); },
          waitDrain() {
            return new Promise((r) => {
              if (!busy && !queue.length) return r();
              drainResolve = r;
            });
          },
          collapse() { det.open = false; },
        };
      }

      // 把回答打字进已有 wrap（trace 下方），返回 Promise
      function typeAnswerInto(wrap, text) {
        // 回答开始打字前先撤下底部的"执行动效 + 已用时长"指示器
        stopRunPill();
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        wrap.appendChild(bubble);
        const full = String(text || "");
        const disp = stripChartForTyping(full);  // 打字阶段不显示 chart 原文
        const step = Math.max(2, Math.ceil(disp.length / 220));
        let i = 0;
        const atBottom = () => main.scrollHeight - main.scrollTop - main.clientHeight < 80;
        return new Promise((resolve) => {
          const timer = setInterval(() => {
            i += step;
            bubble.textContent = disp.slice(0, i);
            if (followTail) main.scrollTop = main.scrollHeight;
            if (i >= disp.length) {
              clearInterval(timer);
              bubble.classList.add("md");
              bubble.innerHTML = renderMd(full);
              enhanceCharts(bubble);
              if (followTail) main.scrollTop = main.scrollHeight;
              resolve();
            }
          }, 14);
        });
      }

      // ===== 执行动效 + 已用时长（橙色闪烁星） =====
      let runTimer = null;
      let runStart = 0;
      const SPARK_SVG =
        '<svg class="spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
        'stroke-width="2.6" stroke-linecap="round" aria-hidden="true">' +
        '<path d="M12 3 a9 9 0 0 1 0 18"/></svg>';
      function stopRunTimer() {
        if (runTimer) { clearInterval(runTimer); runTimer = null; }
      }
      function startRunTimer(startMs) {
        runStart = startMs;
        stopRunTimer();
        const tick = () => {
          const el = document.querySelector("#run-pill .run-time");
          if (!el || !el.isConnected) { stopRunTimer(); return; }
          el.textContent = Math.max(0, Math.floor((Date.now() - runStart) / 1000)) + "s";
        };
        tick();
        runTimer = setInterval(tick, 500);
      }
      function stopRunPill() {
        stopRunTimer();
        document.getElementById("run-pill")?.remove();
      }
      // 占位 bot 消息：仅一个橙色星 + 已用时长，等首个 trace 步骤到达后
      // 该消息会被 startBotMessage 继续复用，pill 一直留在底部直到回答开始。
      function addTyping(elapsedSec) {
        const m = document.createElement("div");
        m.className = "msg bot"; m.id = "typing";
        m.innerHTML =
          '<div class="avatar">助</div>' +
          '<div class="msg__content">' +
            '<div class="run-pill" id="run-pill">' + SPARK_SVG +
            '<span class="run-time">0s</span></div>' +
          '</div>';
        chat.appendChild(m); scrollDown();
        startRunTimer(Date.now() - (elapsedSec || 0) * 1000);
      }
      function removeTyping() {
        stopRunTimer();
        $("typing")?.remove();
      }

      // 折叠的「思考与工具调用」记录块（放在回答前），返回 DOM 节点或 null
      function renderTraceBlock(trace) {
        const steps = (trace || []).filter((s) => s.kind !== "answer");
        if (!steps.length) return null;
        const nThink = steps.filter((s) => s.kind === "thinking").length;
        const nCall = steps.filter((s) => s.kind === "tool-call").length;
        const box = document.createElement("div");
        box.className = "trace";
        const det = document.createElement("details");
        const sum = document.createElement("summary");
        sum.textContent =
          `思考与工具调用记录（${steps.length} 步` +
          (nThink ? ` · ${nThink} 思考` : "") +
          (nCall ? ` · ${nCall} 调用` : "") + "）";
        det.appendChild(sum);
        const list = document.createElement("div");
        list.className = "steps";
        steps.forEach((s) => {
          const d = document.createElement("div");
          const cls = s.kind === "tool-call" ? "call"
            : s.kind === "tool-result" ? "result" : "think";
          d.className = "step " + cls;
          d.textContent = s.text;
          list.appendChild(d);
        });
        det.appendChild(list);
        box.appendChild(det);
        return box;
      }

      const SESS_KEY = "cw.currentSession";
      function rememberSession(id) {
        try { id ? localStorage.setItem(SESS_KEY, id) : localStorage.removeItem(SESS_KEY); } catch {}
      }

      async function loadSessions() {
        sessions = await (await fetch("/api/sessions")).json();
        renderSessionList();
        // 刷新后保持在原会话：恢复上次选中的会话并重新拉取内容
        let saved = null;
        try { saved = localStorage.getItem(SESS_KEY); } catch {}
        if (saved && sessions.some((s) => s.id === saved)) {
          await selectSession(saved);
        }
      }
      function renderSessionList() {
        sessionList.innerHTML = "";
        if (!sessions.length) {
          sessionList.innerHTML = '<div class="session-empty">还没有会话<br>点击上方新建</div>';
          return;
        }
        sessions.forEach((s) => {
          const el = document.createElement("div");
          el.className = "session" + (s.id === currentSession ? " active" : "");
          el.innerHTML = `<span class="session__title">${escapeHtml(s.title)}</span>`;
          const del = document.createElement("button");
          del.className = "session__del";
          del.innerHTML = IC.trash;
          del.title = "删除会话";
          del.onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
          el.appendChild(del);
          el.onclick = () => selectSession(s.id);
          sessionList.appendChild(el);
        });
      }
      function escapeHtml(s) {
        return s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      }

      async function newSession() {
        const s = await (await fetch("/api/sessions", { method: "POST" })).json();
        sessions.unshift(s);
        await selectSession(s.id);
        renderSessionList();
      }

      async function deleteSession(id) {
        if (!confirm("确定删除该会话？此操作不可恢复。")) return;
        await fetch("/api/sessions/" + id, { method: "DELETE" });
        sessions = sessions.filter((s) => s.id !== id);
        if (currentSession === id) {
          currentSession = null;
          rememberSession(null);
          clearChat(true);
          topTitle.textContent = "智能助手";
        }
        renderSessionList();
      }

      async function selectSession(id) {
        // 切换会话前若仍处在某个会话的"生成中"UI，先重置一下（不取消后台 job）
        if (abortCtl) { try { abortCtl.abort(); } catch (_) {} abortCtl = null; setSendMode("send"); input.disabled = false; }
        // 切换会话清空待发附件区
        pendingAttachments = [];
        attachChips.innerHTML = "";
        currentSession = id;
        rememberSession(id);
        renderSessionList();
        closeSidebar();
        const meta = sessions.find((s) => s.id === id);
        topTitle.textContent = meta ? meta.title : "智能助手";
        clearChat(false);
        // 同时拿历史与"后台是否仍在为该会话生成"
        const [msgsResp, infResp] = await Promise.all([
          fetch(`/api/sessions/${id}/messages`),
          fetch(`/api/chat/inflight/${id}`),
        ]);
        const msgs = await msgsResp.json();
        const infData = await infResp.json();
        const inflight = infData.inflight;
        const elapsed = infData.elapsed || 0;
        // 若后台仍在生成：丢掉历史里最末尾的助手回合（可能只是 checkpoint 的
        // 半成品），让 SSE 重放完整 trace+回答，避免双份。
        if (inflight) {
          while (msgs.length && msgs[msgs.length - 1].role !== "user") msgs.pop();
        }
        if (!msgs.length && !inflight) clearChat(true);
        else msgs.forEach((m) => {
          if (m.role === "user") {
            // 把"📎 附件：xxx"行拆出来用小字渲染，与发送当下一致
            const idx = (m.text || "").lastIndexOf("\n📎 附件：");
            const head = idx >= 0 ? m.text.slice(0, idx) : (m.text || "");
            const att = idx >= 0 ? m.text.slice(idx + 1) : "";
            const w = addMsg("user", head || "（仅附件）");
            if (att) {
              const namesText = att.replace(/^📎\s*附件：/, "");
              const names = namesText.split("、").filter(Boolean);
              w.appendChild(buildAttLine(names));
            }
          } else {
            const w = addMsg("bot", m.text);
            if (m.trace && m.trace.length) {
              const tb = renderTraceBlock(m.trace);
              if (tb) w.insertBefore(tb, w.firstChild); // 折叠记录放回答前，持久可看
            }
          }
        });
        resumeFollow();          // 切换会话后定位到最新一条
        refreshLimit();
        if (inflight) attachInflight(id, elapsed);    // 续接，已运行时长接着计
      }

      // ===== Token 上限预警（全局，跨会话共享）=====
      const limitBanner = $("limitBanner");
      const composerEl = document.querySelector(".composer");
      let limitState = { over: false, today: 0, limit: 0 };
      // 页面会话级：用户必须手动点「继续使用」才置 true；刷新页面即失效，会重新弹出。
      let sessionOverride = false;
      let dialogOpen = false;

      function setComposerEnabled(on) {
        composerEl.classList.toggle("disabled", !on);
        input.disabled = !on;
        sendBtn.disabled = !on;
      }

      const ALERT_SVG =
        '<svg class="lb-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

      function applyLimitUI() {
        const s = limitState;
        const tip = `（${(s.today||0).toLocaleString()} / ${(s.limit||0).toLocaleString()}）`;
        if (s.over && !sessionOverride) {
          // 未处理：红色，必须手动点「继续使用」
          limitBanner.className = "limit-banner show blocked";
          limitBanner.innerHTML = ALERT_SVG +
            `<span>今日 Token 已达上限${tip}，已暂停发送。</span>` +
            `<span class="lb-act">点此处理 →</span>`;
          limitBanner.onclick = openLimitDialog;
          setComposerEnabled(false);
        } else if (s.over && sessionOverride) {
          // 已手动点继续：琥珀，预警保留，发送恢复
          limitBanner.className = "limit-banner show overridden";
          limitBanner.innerHTML = ALERT_SVG +
            `<span>今日 Token 已超额${tip}，你已选择「继续使用」，预警保留中。</span>`;
          limitBanner.onclick = null;
          setComposerEnabled(true);
        } else {
          limitBanner.className = "limit-banner";
          limitBanner.onclick = null;
          setComposerEnabled(true);
        }
      }

      async function refreshLimit() {
        try {
          limitState = await api("/api/limit-status");
        } catch {
          limitState = { over: false, today: 0, limit: 0 };
        }
        applyLimitUI();
      }

      // 预警弹窗：继续使用 / 等待明日重置
      function openLimitDialog() {
        if (dialogOpen) return;
        dialogOpen = true;
        const s = limitState;
        const msg =
          `今日 Token 用量已达到上限（${s.today.toLocaleString()} / ${s.limit.toLocaleString()}）。\n` +
          `为控制成本，已暂停继续调用。你可以选择继续使用（忽略今日上限），或等待明日 0 点自动重置。`;
        const mask = document.createElement("div");
        mask.style.cssText =
          "position:fixed;inset:0;z-index:30;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:20px";
        mask.innerHTML = `
          <div style="background:#fff;border-radius:16px;max-width:420px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(15,23,42,.3)">
            <div style="font-size:17px;font-weight:600;margin-bottom:10px;color:#b45309">今日 Token 已达上限</div>
            <div style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-bottom:22px">${esc(msg)}</div>
            <div style="display:flex;gap:10px;justify-content:flex-end">
              <button id="ldWait" class="btn-ghost">等待明日重置</button>
              <button id="ldGo" class="btn-primary">继续使用</button>
            </div>
          </div>`;
        document.body.appendChild(mask);
        const close = () => { mask.remove(); dialogOpen = false; };
        mask.querySelector("#ldGo").onclick = () => {
          sessionOverride = true;   // 仅本次页面会话生效，刷新即失效
          close();
          applyLimitUI();           // 横幅转琥珀（保留），发送恢复可点
          input.focus();
        };
        mask.querySelector("#ldWait").onclick = () => {
          close();
          applyLimitUI();           // 维持红色拦截，发送保持禁用
        };
        mask.onclick = (e) => { if (e.target === mask) { close(); applyLimitUI(); } };
      }

      // ===== 发送 / 禁止 按钮状态切换 =====
      let abortCtl = null;
      const STOP_SVG =
        '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
        'stroke-width="2" stroke-linecap="round" aria-hidden="true">' +
        '<circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></svg>';
      function setSendMode(mode) {
        if (mode === "stop") {
          sendBtn.classList.add("stop");
          sendBtn.innerHTML = STOP_SVG;
          sendBtn.title = "取消当前对话";
          sendBtn.setAttribute("aria-label", "取消当前对话");
          sendBtn.disabled = false;
        } else {
          sendBtn.classList.remove("stop");
          sendBtn.innerHTML = "发送";
          sendBtn.title = "";
          sendBtn.setAttribute("aria-label", "发送");
        }
      }
      // 点击禁止按钮：除了中断本地 SSE 读取，还要通知后端释放该会话的 job，
      // 否则后台 job 仍占用，再次发送会收到 409。
      async function stopChat() {
        const sid = currentSession;
        if (abortCtl) { try { abortCtl.abort(); } catch (_) {} }
        if (sid) { try { await fetch(`/api/chat/cancel/${sid}`, { method: "POST" }); } catch (_) {} }
      }
      const isSending = () => abortCtl !== null;

      // 公共的 SSE 事件消费 + 完成后渲染。`ctx` 跨 try/catch 共享，便于在
      // 取消/异常时引用已经建好的 wrap/live。
      async function consumeStream(response, ctx) {
        const reader = response.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        const handle = (ev) => {
          if (ev.t === "blocked") { ctx.blocked = true; ctx.blockedMessage = ev.message; return; }
          if (ev.t === "error") { ctx.errMsg = ev.message; return; }
          if (ev.t === "step") {
            // 首个步骤到达：startBotMessage 会复用 typing 占位（含 .run-pill），
            // pill 留在最下方，trace 插在其上，直到回答开始才撤下。
            if (!ctx.wrap) { ctx.wrap = startBotMessage(); ctx.live = makeLiveTrace(ctx.wrap); }
            ctx.live.add(ev);
          } else if (ev.t === "done") {
            ctx.doneData = ev;
          }
        };
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let idx;
          while ((idx = buf.indexOf("\n\n")) >= 0) {
            const block = buf.slice(0, idx); buf = buf.slice(idx + 2);
            const line = block.split("\n").find((l) => l.startsWith("data: "));
            if (line) { try { handle(JSON.parse(line.slice(6))); } catch {} }
          }
        }
      }

      async function renderStreamCompletion(ctx) {
        if (ctx.blocked) { removeTyping(); await refreshLimit(); openLimitDialog(); return; }
        if (ctx.errMsg) { removeTyping(); addMsg("bot", "出错了：" + ctx.errMsg); return; }
        // 进入回答阶段：startBotMessage 会复用占位（保留 pill），
        // typeAnswerInto 会先调 stopRunPill 撤下橙星 + 已用时长再开始打字。
        if (!ctx.wrap) ctx.wrap = startBotMessage();
        if (ctx.live) await ctx.live.waitDrain();
        await typeAnswerInto(ctx.wrap, (ctx.doneData && ctx.doneData.answer) || "（无回复）");
        if (ctx.live) ctx.live.collapse();
        if (ctx.doneData) {
          const meta = sessions.find((s) => s.id === currentSession);
          if (meta && ctx.doneData.title) {
            meta.title = ctx.doneData.title;
            topTitle.textContent = ctx.doneData.title;
            renderSessionList();
          }
        }
        await refreshLimit();
      }

      function handleStreamError(ctx, e) {
        if (e && (e.name === "AbortError" || e.code === 20)) {
          // 用户主动取消：保留已显示的 trace，把执行指示器换成"已取消"提示
          if (!ctx.wrap) ctx.wrap = startBotMessage();   // 复用 typing 占位
          stopRunPill();
          if (ctx.live) ctx.live.collapse();
          const note = document.createElement("div");
          note.className = "att-line";
          note.style.color = "#92400e";
          note.textContent = "⏹ 已取消当前对话";
          ctx.wrap.appendChild(note);
        } else {
          removeTyping();
          addMsg("bot", "出错了：" + (e && e.message || e));
        }
      }

      // 进入"正在生成"状态（共享发送/恢复两种流程的 UI 开关）
      function enterSendingUI() {
        abortCtl = new AbortController();
        setSendMode("stop");
        input.disabled = true;
        input.blur();
      }
      function exitSendingUI() {
        abortCtl = null;
        setSendMode("send");
        input.disabled = false;
        if (limitState.over && !sessionOverride) sendBtn.disabled = true;
        input.focus();
      }

      // ===== 附件：拖拽 / 点击 / 多文件 =====
      async function ensureSession() {
        if (currentSession) return currentSession;
        const s = await (await fetch("/api/sessions", { method: "POST" })).json();
        sessions.unshift(s);
        currentSession = s.id;
        rememberSession(s.id);
        renderSessionList();
        return currentSession;
      }
      function fileToB64(f) {
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(String(r.result).split(",")[1]);
          r.onerror = rej;
          r.readAsDataURL(f);
        });
      }
      function fmtSize(n) {
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        return (n / 1024 / 1024).toFixed(1) + " MB";
      }
      // 用户气泡下方的附件列：用扁平线性回形针图标 + "附件：A、B"
      function buildAttLine(names) {
        const al = document.createElement("div");
        al.className = "att-line";
        al.innerHTML =
          '<svg class="ic-att" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
          'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
          '<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>' +
          '<span></span>';
        al.querySelector("span").textContent =
          "附件：" + (names || []).join("、");
        return al;
      }

      function renderChip(name, size, uploading) {
        const c = document.createElement("div");
        c.className = "att-chip" + (uploading ? " uploading" : "");
        c.innerHTML =
          '<svg class="ic" style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>' +
          '<span class="nm"></span><span class="sz"></span>' +
          '<button class="rm" type="button" title="移除">×</button>';
        c.querySelector(".nm").textContent = name;
        c.querySelector(".sz").textContent = fmtSize(size);
        c.querySelector(".rm").onclick = () => {
          const p = c.dataset.path;
          if (p) pendingAttachments = pendingAttachments.filter((a) => a.path !== p);
          c.remove();
        };
        attachChips.appendChild(c);
        return c;
      }
      async function addFiles(list) {
        const files = [...list].filter((f) => f && f.size !== undefined);
        if (!files.length) return;
        const sid = await ensureSession();
        // 多文件并行上传，每个芯片独立进度
        await Promise.all(files.map(async (f) => {
          if (f.size > 25 * 1024 * 1024) { alert(`文件「${f.name}」超过 25MB 上限`); return; }
          const chip = renderChip(f.name, f.size, true);
          try {
            const b64 = await fileToB64(f);
            const r = await fetch("/api/upload", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session_id: sid, files: [{ name: f.name, dataBase64: b64 }] }),
            });
            const j = await r.json();
            if (!r.ok || !j.ok) throw new Error(j.detail || "上传失败");
            const meta = j.files[0];
            pendingAttachments.push(meta);
            chip.dataset.path = meta.path;
            chip.classList.remove("uploading");
          } catch (e) {
            chip.remove();
            alert(`上传「${f.name}」失败：${e.message}`);
          }
        }));
      }

      async function send(text) {
        if (isSending()) return;                            // 生成中：禁止再次发送
        text = (text || input.value).trim();
        const atts = pendingAttachments.slice();
        if (!text && !atts.length) return;                   // 空消息且无附件 → 跳过
        if (limitState.over && !sessionOverride) { openLimitDialog(); return; }
        await ensureSession();
        input.value = ""; input.style.height = "auto";
        const uwrap = addMsg("user", text || "（仅附件）");
        if (atts.length) {
          uwrap.appendChild(buildAttLine(atts.map((a) => a.name)));
        }
        // 清空待发附件区
        pendingAttachments = [];
        attachChips.innerHTML = "";
        resumeFollow();
        addTyping();
        enterSendingUI();
        const ctx = {};
        try {
          const res = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: currentSession, message: text,
              override: sessionOverride, attachments: atts,
            }),
            signal: abortCtl.signal,
          });
          if (!res.ok) {
            const t = await res.text().catch(() => "");
            throw new Error(`HTTP ${res.status}: ${t || res.statusText}`);
          }
          await consumeStream(res, ctx);
          await renderStreamCompletion(ctx);
        } catch (e) {
          handleStreamError(ctx, e);
        } finally {
          exitSendingUI();
        }
      }

      // 刷新页面后，如果后台仍在为当前会话生成回复，自动重新挂载该 SSE 流。
      async function attachInflight(sid, elapsedSec) {
        addTyping(elapsedSec || 0);
        enterSendingUI();
        const ctx = {};
        try {
          const res = await fetch(`/api/chat/stream/${sid}`, { signal: abortCtl.signal });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          await consumeStream(res, ctx);
          await renderStreamCompletion(ctx);
        } catch (e) {
          handleStreamError(ctx, e);
        } finally {
          exitSendingUI();
        }
      }

      function closeSidebar() { sidebar.classList.remove("open"); scrim.classList.remove("open"); }
      $("menuBtn").onclick = () => { sidebar.classList.add("open"); scrim.classList.add("open"); };
      scrim.onclick = closeSidebar;
      $("newBtn").onclick = newSession;
      sendBtn.onclick = () => { if (isSending()) stopChat(); else send(); };
      input.addEventListener("keydown", (e) => {
        // 输入法（中文等）正在组词时按回车只是上屏候选，不应触发发送
        if (e.isComposing || e.keyCode === 229) return;
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          if (!isSending()) send();  // 生成中：禁止再次发送
        }
      });
      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 140) + "px";
      });
      document.querySelectorAll(".chip").forEach((c) =>
        c.addEventListener("click", () => { if (!isSending()) send(c.textContent); }));

      // ===== 附件：点击选择 + 拖拽上传（支持多文件） =====
      attachBtn.onclick = () => fileInput.click();
      fileInput.addEventListener("change", () => {
        if (fileInput.files.length) addFiles(fileInput.files);
        fileInput.value = "";  // 允许重选同名文件
      });
      let dragDepth = 0;
      const hasFiles = (e) =>
        e.dataTransfer && [...(e.dataTransfer.types || [])].includes("Files");
      const inModal = () => $("modalMask").classList.contains("open");
      window.addEventListener("dragenter", (e) => {
        if (!hasFiles(e) || inModal()) return;
        e.preventDefault();
        dragDepth++;
        dropOverlay.classList.add("show");
      });
      window.addEventListener("dragover", (e) => {
        if (!hasFiles(e) || inModal()) return;
        e.preventDefault();
      });
      window.addEventListener("dragleave", (e) => {
        if (!hasFiles(e) || inModal()) return;
        dragDepth = Math.max(0, dragDepth - 1);
        if (dragDepth === 0) dropOverlay.classList.remove("show");
      });
      window.addEventListener("drop", (e) => {
        if (inModal()) return;
        if (!hasFiles(e)) { dragDepth = 0; dropOverlay.classList.remove("show"); return; }
        e.preventDefault();
        dragDepth = 0;
        dropOverlay.classList.remove("show");
        if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);   // 多文件
      });

      // ===== Settings center =====
      const modalMask = $("modalMask"), modalBody = $("modalBody");
      let curTab = "llm";

      function openSettings() { modalMask.classList.add("open"); renderTab(curTab); }
      function closeSettings() { modalMask.classList.remove("open"); }
      $("settingsBtn").onclick = openSettings;
      $("modalClose").onclick = closeSettings;
      modalMask.onclick = (e) => { if (e.target === modalMask) closeSettings(); };
      document.querySelectorAll(".tab-btn").forEach((b) =>
        b.onclick = () => {
          curTab = b.dataset.tab;
          document.querySelectorAll(".tab-btn").forEach((x) =>
            x.classList.toggle("active", x === b));
          renderTab(curTab);
        });

      const api = (u, o) => fetch(u, o).then((r) => r.json());
      const esc = (s) => String(s).replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      async function renderTab(tab) {
        modalBody.innerHTML = '<div class="sub">加载中…</div>';
        if (tab === "llm") return renderLlmTab();
        if (tab === "usage") return renderUsageTab();
        if (tab === "skills") return renderSkillsTab();
        if (tab === "fhe") return renderFheTab();
      }

      // --- 大模型配置（API + 模型选择 合并）---
      async function renderLlmTab() {
        const cfg = await api("/api/config");
        const p = (cfg.providers || [])[0] || { id: "", name: "", baseUrl: "", models: [] };
        const hasKey = !!p.apiKeyMasked;
        const active = cfg.activeModel || "";
        let models = (p.models || []).slice();
        if (active && !models.includes(active)) models.unshift(active);

        const optsHtml = () => models.map((m) =>
          `<option ${m === active ? "selected" : ""}>${esc(m)}</option>`).join("")
          || '<option value="">（请先获取模型列表）</option>';

        modalBody.innerHTML = `
          <h2>大模型配置</h2>
          <div class="sub">填写 OpenAI 兼容的 API，点「获取可用模型」自动探测，再选择默认模型。密钥仅保存在本地。</div>
          <div class="field"><label>供应商名称</label>
            <input id="pName" value="${esc(p.name||"")}" placeholder="如 OpenRouter"></div>
          <div class="field"><label>Base URL</label>
            <input id="pUrl" value="${esc(p.baseUrl||"")}" placeholder="https://openrouter.ai/api/v1"></div>
          <div class="field"><label>API Key ${hasKey ? `（当前：${esc(p.apiKeyMasked)}，留空不修改）` : ""}</label>
            <div class="row" style="flex-wrap:nowrap">
              <input id="pKey" type="password" placeholder="${hasKey ? '••••••••（留空则不修改）' : 'sk-...'}" style="flex:1">
              <button type="button" class="btn-ghost" id="keyToggle" title="显示/隐藏" style="padding:8px 12px">${IC.eye}</button>
            </div>
          </div>
          <div class="field">
            <label>可用模型</label>
            <div class="row">
              <select id="modelSel" style="flex:1">${optsHtml()}</select>
              <button class="btn-ghost ic-btn" id="probeBtn">${IC.search} 获取可用模型</button>
            </div>
            <div id="probeMsg" style="font-size:12px;color:var(--text-muted);margin-top:6px"></div>
          </div>
          <button class="btn-primary" id="saveLlm">保存并应用</button>
          <span id="llmMsg" style="margin-left:12px;color:var(--text-muted);font-size:13px"></span>`;

        $("keyToggle").onclick = () => {
          const k = $("pKey");
          k.type = k.type === "password" ? "text" : "password";
          $("keyToggle").innerHTML = k.type === "password" ? IC.eye : IC.eyeOff;
        };

        $("probeBtn").onclick = async () => {
          const pm = $("probeMsg");
          pm.textContent = "正在探测…（调用供应商 /models 接口）";
          $("probeBtn").disabled = true;
          try {
            const res = await api("/api/probe-models", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ baseUrl: $("pUrl").value.trim(), apiKey: $("pKey").value.trim() }),
            });
            if (res.ok) {
              models = res.models;
              const cur = $("modelSel").value;
              $("modelSel").innerHTML = models.map((m) =>
                `<option ${m === (cur || active) ? "selected" : ""}>${esc(m)}</option>`).join("");
              pm.textContent = `✓ 检测到 ${res.count} 个可用模型，已填入下拉框`;
              pm.style.color = "#16a34a";
            } else {
              pm.textContent = "✗ 获取失败：" + res.error + "（可手动在下方下拉框旁补充，或检查 Key/URL）";
              pm.style.color = "#dc2626";
            }
          } catch (e) {
            pm.textContent = "✗ 请求出错：" + e.message;
            pm.style.color = "#dc2626";
          } finally {
            $("probeBtn").disabled = false;
          }
        };

        $("saveLlm").onclick = async () => {
          const name = $("pName").value.trim();
          const url = $("pUrl").value.trim();
          if (!url) { $("llmMsg").textContent = "✗ 请填写 Base URL"; $("llmMsg").style.color = "#dc2626"; return; }
          if (!hasKey && !$("pKey").value.trim()) {
            $("llmMsg").textContent = "✗ 请填写 API Key"; $("llmMsg").style.color = "#dc2626"; return;
          }
          const allModels = Array.from($("modelSel").options).map((o) => o.value).filter(Boolean);
          const chosen = $("modelSel").value;
          const pid = p.id || "default";
          const prov = { id: pid, name: name || "默认供应商",
            baseUrl: url, apiKey: $("pKey").value.trim(),
            models: allModels.length ? allModels : models };
          await api("/api/config", { method: "PUT", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ providers: [prov], activeProvider: pid, activeModel: chosen }) });
          $("llmMsg").style.color = "var(--text-muted)";
          $("llmMsg").textContent = "✓ 已保存" + (chosen ? "，模型「" + chosen + "」已热切换" : "");
        };
      }

      // --- Token 用量及监控（用量统计 + 监控预警 合并）---
      async function renderUsageTab() {
        const [u, cfg] = await Promise.all([api("/api/usage"), api("/api/config")]);
        const a = cfg.alert || { enabled: false, dailyTokenLimit: 200000 };
        const max = Math.max(1, ...u.series.map((s) => s.tokens));
        modalBody.innerHTML = `
          <h2>Token 用量及监控</h2>
          <div class="sub">统计所有会话的 token 消耗，并可设置每日用量预警。</div>
          ${u.alert.triggered ? `<div class="alert-box">⚠ 今日用量 ${u.todayTokens.toLocaleString()} 已达到预警上限 ${u.alert.dailyTokenLimit.toLocaleString()}</div>` : ""}
          <div class="stat-grid">
            <div class="stat"><div class="num">${u.totalTokens.toLocaleString()}</div><div class="lbl">累计 Token</div></div>
            <div class="stat"><div class="num">${u.todayTokens.toLocaleString()}</div><div class="lbl">今日 Token</div></div>
            <div class="stat"><div class="num">${u.callCount}</div><div class="lbl">调用次数</div></div>
          </div>
          <label style="font-size:13px;font-weight:600">近 14 天趋势（鼠标悬停查看具体数值）</label>
          <div class="bars">${(() => {
            const MAXPX = 130;
            const peak = Math.max(1, ...u.series.map((s) => s.tokens));
            return u.series.map((s) => {
              const h = s.tokens > 0 ? Math.max(3, Math.round(s.tokens / peak * MAXPX)) : 1;
              return `<div class="bar-wrap"><div class="bar-col">` +
                `<div class="bar" style="height:${h}px" title="${s.day}：${s.tokens.toLocaleString()} tokens"></div>` +
                `</div><div class="bar-lbl">${s.day.slice(5)}</div></div>`;
            }).join("");
          })()}</div>
          <label style="font-size:13px;font-weight:600;display:block;margin-top:22px">按模型</label>
          <table class="usage-tbl"><tr><th>模型</th><th>Token</th></tr>
            ${u.byModel.map((m) => `<tr><td>${esc(m.model)}</td><td>${m.tokens.toLocaleString()}</td></tr>`).join("") || '<tr><td colspan=2 class="sub">暂无</td></tr>'}
          </table>

          <hr style="border:none;border-top:1px solid var(--border);margin:24px 0 18px">
          <h2 style="font-size:16px">监控预警</h2>
          <div class="sub">开启后，今日 Token 用量达到上限时会暂停调用并弹窗，由你选择继续使用或等待次日重置。默认关闭。</div>
          <div class="field"><label>启用预警</label>
            <select id="aEn"><option value="0" ${!a.enabled?"selected":""}>关闭（默认）</option>
            <option value="1" ${a.enabled?"selected":""}>开启</option></select></div>
          <div class="field"><label>每日 Token 上限</label>
            <input id="aLim" type="number" value="${a.dailyTokenLimit||0}"></div>
          <button class="btn-primary" id="saveAlert">保存预警设置</button>
          <span id="aMsg" style="margin-left:12px;color:var(--text-muted);font-size:13px"></span>`;
        $("saveAlert").onclick = async () => {
          await api("/api/config", { method: "PUT", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ alert: { enabled: $("aEn").value === "1",
              dailyTokenLimit: parseInt($("aLim").value) || 0 } }) });
          $("aMsg").textContent = "✓ 已保存";
        };
      }

      // --- Skill 管理 ---
      const skMsg = (t, c) => { const m = $("skMsg"); if (m) { m.textContent = t; m.style.color = c || "var(--text-muted)"; } };

      function fileToB64(file) {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result.split(",")[1] || "");
          r.onerror = reject;
          r.readAsDataURL(file);
        });
      }

      // 递归读取一个 webkit FileSystemEntry，收集 {path, file}
      function walkEntry(entry, base, acc) {
        return new Promise((resolve) => {
          if (entry.isFile) {
            entry.file((f) => { acc.push({ path: base + entry.name, file: f }); resolve(); });
          } else if (entry.isDirectory) {
            const reader = entry.createReader();
            const readAll = () => reader.readEntries(async (ents) => {
              if (!ents.length) return resolve();
              for (const e of ents) await walkEntry(e, base + entry.name + "/", acc);
              readAll();
            });
            readAll();
          } else resolve();
        });
      }

      async function installBundle(collected) {
        // collected: [{path, file}]
        const skipped = /(^|\/)(\.DS_Store|__MACOSX|\.git)(\/|$)/i;
        const wanted = collected.filter((c) => !skipped.test(c.path));
        if (!wanted.some((c) => /(^|\/)SKILL\.md$/i.test(c.path))) {
          skMsg("✗ 未找到 SKILL.md（文件夹内每个技能需含一个 SKILL.md）", "#dc2626");
          return;
        }
        skMsg(`正在读取 ${wanted.length} 个文件并校验…`);
        const files = [];
        for (const c of wanted) files.push({ path: c.path, b64: await fileToB64(c.file) });
        const res = await fetch("/api/skills/upload", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ files }),
        });
        const data = await res.json();
        if (!res.ok) { skMsg("✗ " + (data.detail || "安装失败"), "#dc2626"); return; }
        const oks = data.skills.filter((s) => s.ok);
        const bad = data.skills.filter((s) => !s.ok);
        let m = `✓ 安装 ${oks.length}/${data.total} 个技能` +
          (oks.length ? "：" + oks.map((s) => `${s.name}(${s.fileCount}文件)`).join("、") : "");
        if (bad.length) m += `；✗ 跳过：` + bad.map((s) => `${s.name}（${s.error}）`).join("、");
        skMsg(m, bad.length ? "#b45309" : "#16a34a");
        setTimeout(renderSkillsTab, 900);
      }

      async function addSkillFromFile(file) {
        // 单个 SKILL.md 文件：包装成 bundle 走同一通道
        if (!/\.(md|markdown|txt)$/i.test(file.name)) {
          skMsg("✗ 单文件仅支持 .md（或拖拽整个技能文件夹）", "#dc2626"); return;
        }
        skMsg("正在校验格式…");
        await installBundle([{ path: "SKILL.md", file }]);
      }

      async function renderSkillsTab() {
        const skills = await api("/api/skills");
        modalBody.innerHTML = `
          <h2>Skill 管理</h2>
          <div class="sub">管理技能（OpenClaw 规范：每个技能为一个目录，含 SKILL.md + references/scripts/templates/assets）。支持<b>拖拽整个文件夹</b>（可含多个技能），校验通过后自动入列。</div>
          <div id="skList">${skills.map((s) => `
            <div class="list-item"><div class="grow"><div class="t">${esc(s.name)}
            ${s.fileCount>1?`<span style="font-size:11px;color:var(--text-muted)">· ${s.fileCount} 个文件</span>`:""}</div>
            <div class="d">${esc(s.description||"（无描述）")}</div></div>
            <button class="btn-ghost btn-danger" data-del="${esc(s.id)}">删除</button></div>`
          ).join("") || '<div class="sub" style="margin-bottom:8px">暂无技能</div>'}</div>
          <hr style="border:none;border-top:1px solid var(--border);margin:18px 0">
          <div id="skDrop" class="sk-drop">
            <div class="sk-drop__ic">
              <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <div class="sk-drop__t">把 <b>技能文件夹</b>（或单个 SKILL.md）拖到这里</div>
            <div class="sk-drop__s">或 <label class="sk-pick">选择文件夹<input type="file" id="skDir" webkitdirectory directory multiple hidden></label>
            ／ <label class="sk-pick">选择单文件<input type="file" id="skFile" accept=".md,.markdown,.txt" hidden></label></div>
          </div>
          <div id="skMsg" style="margin-top:12px;font-size:13px;color:var(--text-muted)"></div>
          <div class="sub" style="margin-top:14px;font-size:12px">规范：技能目录内 <code>SKILL.md</code> 的 frontmatter 须含 <code>name</code>、<code>description</code> 且有正文；可附带 references/scripts/templates/assets 等关联文件，整目录一并安装。</div>`;
        modalBody.querySelectorAll("[data-del]").forEach((b) =>
          b.onclick = async () => { if (confirm("删除该技能？")) {
            await fetch("/api/skills/" + encodeURIComponent(b.dataset.del), { method: "DELETE" }); renderSkillsTab(); } });
        $("skFile").onchange = (e) => { const f = e.target.files[0]; if (f) addSkillFromFile(f); };
        // 文件夹选择（webkitdirectory：file.webkitRelativePath 含目录结构）
        $("skDir").onchange = (e) => {
          const fs = Array.from(e.target.files || []);
          if (!fs.length) return;
          installBundle(fs.map((f) => ({ path: f.webkitRelativePath || f.name, file: f })));
        };
        const dz = $("skDrop");
        dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("dragover"); });
        dz.addEventListener("dragleave", (e) => { if (!dz.contains(e.relatedTarget)) dz.classList.remove("dragover"); });
        dz.addEventListener("drop", async (e) => {
          e.preventDefault(); dz.classList.remove("dragover");
          const items = e.dataTransfer.items ? Array.from(e.dataTransfer.items) : [];
          const entries = items.map((it) => it.webkitGetAsEntry && it.webkitGetAsEntry()).filter(Boolean);
          if (entries.length) {
            skMsg("正在读取文件夹…");
            const acc = [];
            for (const en of entries) await walkEntry(en, "", acc);
            await installBundle(acc);
          } else {
            const f = e.dataTransfer.files && e.dataTransfer.files[0];
            if (f) addSkillFromFile(f);
          }
        });
      }

      // --- 同态密钥 ---
      async function uploadFheFile(name, file) {
        const buf = new Uint8Array(await file.arrayBuffer());
        let bin = ""; const CH = 0x8000;
        for (let i = 0; i < buf.length; i += CH)
          bin += String.fromCharCode.apply(null, buf.subarray(i, i + CH));
        await api("/api/fhe-keys", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, dataBase64: btoa(bin) }) });
        renderFheTab();
      }

      async function renderFheTab() {
        const ks = await api("/api/fhe-keys");
        const labels = { skf: "SKF 私钥", dictf: "运算字典", user_authorization: "授权许可" };
        modalBody.innerHTML = `
          <h2>同态密钥管理</h2>
          <div class="sub">FHE 密态计算所需的三份本地密钥文件，仅保存在本机。可点击「上传」或<b>直接拖拽文件</b>到对应行；上传后自动放置到运行时目录。</div>
          ${ks.every((k) => k.present) ? '<div class="badge ok" style="display:inline-block;margin-bottom:16px">✓ 全部就绪</div>'
            : '<div class="badge warn" style="display:inline-block;margin-bottom:16px">⚠ 未完全就绪</div>'}
          ${ks.map((k) => `
            <div class="list-item fhe-drop" data-drop="${k.name}">
              <div class="grow"><div class="t">${labels[k.name]||k.name} <code style="font-size:11px;color:var(--text-muted)">${k.name}</code></div>
              <div class="d">${k.present ? `${(k.size/1024).toFixed(1)} KB · ${k.mtime}` : "拖拽文件到此处，或点击上传"}</div></div>
              <span class="badge ${k.present?"ok":"no"}">${k.present?"已上传":"缺失"}</span>
              <label class="btn-ghost">上传<input type="file" hidden data-up="${k.name}"></label>
              ${k.present ? `<button class="btn-ghost btn-danger" data-rm="${k.name}">删除</button>` : ""}
            </div>`).join("")}`;
        modalBody.querySelectorAll("[data-up]").forEach((inp) =>
          inp.onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            await uploadFheFile(inp.dataset.up, f);
          });
        modalBody.querySelectorAll("[data-rm]").forEach((b) =>
          b.onclick = async () => { if (confirm("删除该密钥？")) {
            await fetch("/api/fhe-keys/" + b.dataset.rm, { method: "DELETE" }); renderFheTab(); } });
        // 拖拽上传
        modalBody.querySelectorAll(".fhe-drop").forEach((row) => {
          const name = row.dataset.drop;
          row.addEventListener("dragover", (e) => {
            e.preventDefault(); row.classList.add("dragover");
          });
          row.addEventListener("dragleave", (e) => {
            if (!row.contains(e.relatedTarget)) row.classList.remove("dragover");
          });
          row.addEventListener("drop", async (e) => {
            e.preventDefault(); row.classList.remove("dragover");
            const f = e.dataTransfer.files && e.dataTransfer.files[0];
            if (f) await uploadFheFile(name, f);
          });
        });
      }

      // 图表点击放大；点空白处 / ESC 关闭
      function openChartModal(svgHtml) {
        const mask = document.createElement("div");
        mask.className = "chart-modal";
        const inner = document.createElement("div");
        inner.className = "chart-modal__inner";
        inner.innerHTML = svgHtml;
        mask.appendChild(inner);
        document.body.appendChild(mask);
        const close = () => {
          mask.remove();
          document.removeEventListener("keydown", onKey);
        };
        const onKey = (e) => { if (e.key === "Escape") close(); };
        mask.addEventListener("click", (e) => { if (e.target === mask) close(); });
        document.addEventListener("keydown", onKey);
      }
      chat.addEventListener("click", (e) => {
        const box = e.target.closest && e.target.closest(".chart-box");
        if (box) openChartModal(box.innerHTML);
      });

      loadSessions();
      refreshLimit();
      setInterval(refreshLimit, 30000); // 周期性同步全局预警状态
      input.focus();
    </script>
  </body>
</html>
